# Release the AssetPort VS Code extension for every platform.
#
# All per-platform VSIXs are built from a single Linux runner — `package:all` downloads
# each target's @napi-rs/image binary with `npm pack`, so no build matrix is needed.
#
# Trigger: push a tag like `v0.1.0` (or run manually via "Run workflow").
#
# Required repository secrets:
#   VSCE_PAT  - Azure DevOps PAT for the VS Code Marketplace (Marketplace > Manage publishers).
#   OVSX_PAT  - Open VSX access token (open-vsx.org > user settings > Access Tokens).
# Publishing steps are skipped (with a notice) when the matching secret is absent, so a tag
# still produces a GitHub Release with the VSIXs attached even before tokens are configured.
#
# NOTE: `apps/vscode/package.json` "publisher" must be a real Marketplace publisher ID, not
# the placeholder, or `vsce publish` will reject the upload.

name: Release VS Code Extension

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all-platform VSIXs
        run: pnpm run package:vscode:all

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        working-directory: apps/vscode
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::notice::VSCE_PAT not set — skipping VS Code Marketplace publish."
            exit 0
          fi
          npx @vscode/vsce publish --no-dependencies --packagePath release/*.vsix

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        working-directory: apps/vscode
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::notice::OVSX_PAT not set — skipping Open VSX publish."
            exit 0
          fi
          for vsix in release/*.vsix; do
            npx ovsx publish "$vsix" -p "$OVSX_PAT"
          done

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/vscode/release/*.vsix
          generate_release_notes: true
